[alembic]
script_location = alembic
prepend_sys_path = .

; sqlalchemy.url is deliberately left blank here — env.py pulls it from
; get_settings().database_url (i.e. DATABASE_URL in .env) at runtime instead,
; so the connection string (with password) never lives in a committed file.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
